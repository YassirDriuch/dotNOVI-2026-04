name: dotNovi

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main]

  schedule:
    - cron: '0 9 * * *'

  workflow_dispatch:
    inputs:
      environment:
          description: 'Environment to deploy'
          required: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg-isready
          --health-interval 10s
        ports:
          - 5432:5432


    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy
        if: github.ref == 'refs/heads/main'
        run: npm run deploy

    strategy:
      matrix:
        node-version: [18, 20]


