name: dotNovi

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main]

  schedule:
    - cron: '0 9 * * *'

  workflow_dispatch:
    inputs:
      environment:
          description: 'Environment to deploy'
          required: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dotnovi
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
        ports:
          - 5432:5432


    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Deploy
        if: github.ref == 'refs/heads/main'
        run: echo "Deploying!"

    strategy:
      matrix:
        node-version: [18, 20]


