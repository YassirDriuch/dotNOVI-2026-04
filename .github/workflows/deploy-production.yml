name: Deploy to Production

on:
  repository_dispatch:
    types: [deploy-production]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string

jobs:
  deploy:
    name: Blue-Green Deployment
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Get image tag
        id: image
        run: |
          IMAGE_TAG="${{ github.event.client_payload.image_tag || inputs.image_tag }}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "[IMAGE] Deploying image: $IMAGE_TAG"

      - name: Trigger Render  deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          IMAGE_TAG: ${{ steps.image.outputs.image_tag }}
        run: |
          echo "Triggering Render deploy"
          curl -fsS --get "$RENDER_DEPLOY_HOOK" --data-urlencode "imgURL=$IMAGE_TAG"

      - name: Wait for Render
        run: |
          echo "Waiting for Render to start the new instance"
          sleep 90

      - name: Smoke test production
        run: |
          echo "[SMOKE] Testing production health endpoint"
          curl -f "${{ secrets.RENDER_SERVICE_URL }}/health"
          
          echo "[SMOKE] Testing production API endpoint"
          curl -f "${{ secrets.RENDER_SERVICE_URL }}/api/notes"

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && needs.deploy.result == 'failure'
    environment: production

    steps:
      - name: Rollback info
        run: |
          echo "[ROLLBACK] Render deployment failed."
