name: Deploy to Production

on:
  repository_dispatch:
    types: [deploy-production]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string

      test_rollback:
        description: 'Force rollback after successful smoke test'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    name: Render Deployment
    runs-on: ubuntu-latest
    environment: production

    outputs:
      previous_deploy_id: ${{ steps.previous_deploy.outputs.deploy_id }}
      
    steps:
      - name: Get image tag
        id: image
        run: |
          IMAGE_TAG="${{ github.event.client_payload.image_tag || inputs.image_tag }}"
          if [ -z "$IMAGE_TAG" ]; then
            echo "ERROR: No image tag provided. Please provide an image tag via the workflow_dispatch input or the repository_dispatch payload."
            exit 1
          fi
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "[IMAGE] Deploying image: $IMAGE_TAG"
          
      - name: Remember current production deployment
        id: previous_deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          deployments="$(curl \
            --fail-with-body \
            --silent \
            --show-error \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Accept: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys?status=live&limit=1")"

          previous_deploy_id="$(echo "$deployments" |
            jq -r '.[0].deploy.id // empty')"

          if [ -z "$previous_deploy_id" ]; then
            echo "::error::Geen huidige Render-deployment gevonden"
            exit 1
          fi

          echo "Current production deployment: $previous_deploy_id"
          echo "deploy_id=$previous_deploy_id" >> "$GITHUB_OUTPUT"

      - name: Trigger Render deploy

        run: |
          echo "Triggering Render deploy"
          curl -X POST "${{secrets.RENDER_DEPLOY_HOOK}}"

      - name: Wait for Render
        run: |
          echo "Waiting for Render to start the new instance"
          sleep 90

      - name: Smoke test production
        run: |
          HEALTH_URL="${{ secrets.RENDER_SERVICE_URL }}/health"

          echo "Testing: $HEALTH_URL"

          RESPONSE="$(curl \
            --fail-with-body \
            --silent \
            --show-error \
            --location \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            "$HEALTH_URL")"

          echo "Health response: $RESPONSE"

          if ! STATUS="$(echo "$RESPONSE" | jq -r '.status // empty')"; then
            echo "Health endpoint returned invalid JSON"
            exit 1
          fi

          if [ "$STATUS" != "healthy" ]; then
            echo "Application is not healthy. Status: $STATUS"
            exit 1
          fi

          echo "Production is healthy"
          
          echo "Testing production API endpoint"
          curl "${{ secrets.RENDER_SERVICE_URL }}/api/notes"
      - name: Force failure for rollback test
        if: github.event_name == 'workflow_dispatch' && inputs.test_rollback == true
        run: |
          echo "::warning::Intentional failure to test rollback"
          exit 1

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && needs.deploy.result == 'failure'
    environment: production

    steps:
      - name: Rollback to previous Render deployment
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
          PREVIOUS_DEPLOY_ID: ${{ needs.deploy.outputs.previous_deploy_id }}
        run: |
          set -euo pipefail

          if [ -z "$PREVIOUS_DEPLOY_ID" ]; then
            echo "::error::Geen vorige deployment-ID beschikbaar"
            exit 1
          fi

          echo "[ROLLBACK] Rolling back to: $PREVIOUS_DEPLOY_ID"

          PAYLOAD="$(jq -n \
            --arg deployId "$PREVIOUS_DEPLOY_ID" \
            '{deployId: $deployId}')"

          ROLLBACK_RESPONSE="$(curl \
            --fail-with-body \
            --silent \
            --show-error \
            --request POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/rollback" \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "$PAYLOAD")"

          echo "Rollback response: $ROLLBACK_RESPONSE"
          echo "Waiting for the previous deployment to become healthy"

          for attempt in {1..12}; do
            if HEALTH_RESPONSE="$(curl \
              --fail-with-body \
              --silent \
              --show-error \
              --connect-timeout 10 \
              --max-time 20 \
              "${RENDER_SERVICE_URL}/health")"; then

              if echo "$HEALTH_RESPONSE" |
                jq -e \
                  '.status == "healthy" and .database == "connected"' \
                  > /dev/null; then

                echo "Rollback succeeded"
                echo "Health response: $HEALTH_RESPONSE"
                exit 0
              fi
            fi

            echo "Rollback not healthy yet, attempt ${attempt}/12"
            sleep 10
          done

          echo "::error::Rollback was triggered, but production did not become healthy"
          exit 1