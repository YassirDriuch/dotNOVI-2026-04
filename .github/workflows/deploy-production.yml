name: Deploy to Production

on:
  repository_dispatch:
    types: [deploy-production]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string

jobs:
  deploy:
    name: Render Deployment
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Get image tag
        id: image
        run: |
          IMAGE_TAG="${{ github.event.client_payload.image_tag || inputs.image_tag }}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "[IMAGE] Deploying image: $IMAGE_TAG"

      - name: Trigger Render  deploy

        run: |
          echo "Triggering Render deploy"
          curl -X POST "${{secrets.RENDER_DEPLOY_HOOK}}"

      - name: Wait for Render
        run: |
          echo "Waiting for Render to start the new instance"
          sleep 90

      - name: Smoke test production
        run: |
          HEALTH_URL="${{ secrets.RENDER_SERVICE_URL }}/health"

          echo "Testing: $HEALTH_URL"

          RESPONSE="$(curl \
            --fail-with-body \
            --silent \
            --show-error \
            --location \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            "$HEALTH_URL")"

          echo "Health response: $RESPONSE"

          if ! STATUS="$(echo "$RESPONSE" | jq -r '.status // empty')"; then
            echo "Health endpoint returned invalid JSON"
            exit 1
          fi

          if [ "$STATUS" != "healthy" ]; then
            echo "Application is not healthy. Status: $STATUS"
            exit 1
          fi

          echo "Production is healthy"
          
          echo "Testing production API endpoint"
          curl "${{ secrets.RENDER_SERVICE_URL }}/api/notes"

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && needs.deploy.result == 'failure'
    environment: production

    steps:
      - name: Rollback to stable Render deploy
        run: |
          echo "[ROLLBACK] Render deployment failed."
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/rollback" -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" -H "Content-Type: application/json" -d "{\"deployId\":\"${{ secrets.ROLLBACK_DEPLOY_ID }}\"}"
