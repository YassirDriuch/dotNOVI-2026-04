name: Security Scan (Trivy)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  trivy-security:
    runs-on: ubuntu-latest
    steps:
      - name: Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/yassirdriuch/dotnovi-2026-04:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'