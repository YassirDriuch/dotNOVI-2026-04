# Docker Compose for dotNOVI Application
# Orchestrates multiple containers: app + database

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:18-alpine
    container_name: dotnovi-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgrespassword}
      POSTGRES_DB: dotnovi
    ports:
      - "5432:5432"
    volumes:
      # Mount initialization script
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
      # Persist data
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dotnovi-network
    restart: unless-stopped

  # dotNOVI Application Service
  app:
    build:
      context: ./
      dockerfile: Dockerfile.multistage
    container_name: dotnovi-app
    environment:
      NODE_ENV: production
      PORT: 3000
      # Database connection string
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgrespassword}@postgres:5432/dotnovi
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Optional: mount logs
      - app_logs:/app/logs
    networks:
      - dotnovi-network
    restart: unless-stopped
    # Graceful shutdown
    stop_grace_period: 10s

  # Optional: Adminer (database management UI)
  adminer:
    image: adminer:latest
    container_name: dotnovi-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - dotnovi-network
    restart: unless-stopped

# Defined volumes for persistence
volumes:
  postgres_data:
    driver: local
  app_logs:
    driver: local

# Defined network
networks:
  dotnovi-network:
    driver: bridge
