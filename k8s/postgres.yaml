apiVersion: v1
kind: Secret
metadata:
  name: dotnovi-db-secret
type: Opaque
stringData:
  POSTGRES_USER: dotnovi
  POSTGRES_PASSWORD: devops123
  POSTGRES_DB: dotnovi
---
apiVersion: v1
kind: Service
metadata:
  name: dotnovi-db
spec:
  selector:
    app: dotnovi-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnovi-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dotnovi-db
  template:
    metadata:
      labels:
        app: dotnovi-db
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: dotnovi-db-secret